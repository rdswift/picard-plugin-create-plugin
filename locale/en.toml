"qt.CreatePluginOptionsPage.tooltip.base_language" = "The language used for the title and description, and the basis for any translations."
"qt.CreatePluginOptionsPage.tooltip.button.clear" = "Clear the input form and reset options to the saved values."
"qt.CreatePluginOptionsPage.tooltip.button.create" = "Create the plugin based on the selected settings."
"qt.CreatePluginOptionsPage.tooltip.button.select" = "View or modify the selected code templates to include in the generated plugin."
"qt.CreatePluginOptionsPage.tooltip.enter_initial_commit" = "Determines whether or not to create an initial commit to the git repository for the plugin."
"qt.CreatePluginOptionsPage.tooltip.open_directory_browser" = "Open the directory browser to select the root directory."
"qt.CreatePluginOptionsPage.tooltip.open_plugin_directory" = "Opens the directory of the newly created plugin in your system file browser."
"qt.CreatePluginOptionsPage.tooltip.plugin.type" = "The code templates to be included in the plugin.  If no templates are selected, a basic plugin will be created."
"qt.CreatePluginOptionsPage.tooltip.plugin_author_email" = "The email address of the plugin author. This is used for the initial Git commit, as well as the link shown in the MANIFEST to use for for reporting bugs."
"qt.CreatePluginOptionsPage.tooltip.plugin_author_name" = "The name of the plugin author. This is used for the initial Git commit, as well as being shown in the MANIFEST."
"qt.CreatePluginOptionsPage.tooltip.plugin_categories" = "The categories to which the plugin belongs. This is used in the plugin's metadata and is how the plugin will be categorized on the Picard website and in the Picard plugins registry. Multiple categories can be selected for a plugin, and the categories are not mutually exclusive. If no categories are selected, then the plugin will be uncategorized."
"qt.CreatePluginOptionsPage.tooltip.plugin_description" = "A description of the plugin's functionality, and may contain markdown. This is used in the plugin's metadata, and is also added to the README.md file for the plugin. The plugin's short description is also added to the plugin's metadata, and is used in the plugin listing on the Picard website. The short description is generated by taking the first paragraph of the description, up to a maximum of 200 characters."
"qt.CreatePluginOptionsPage.tooltip.plugin_directory" = "The root directory under which any new plugins will be created. Each new plugin and Git repository will be created in a separate directory under this root directory. The individual plugin subdirectory names will be derived from the plugin's title."
"qt.CreatePluginOptionsPage.tooltip.plugin_license" = "The license under which the plugin is distributed. This is used in the plugin's metadata. The license is selected from a list of common open source licenses. There is also an option for 'Other' or proprietary, which will allow you to specify a custom license; however, this will have to be entered into the plugin's MANIFEST.toml file manually."
"qt.CreatePluginOptionsPage.tooltip.plugin_title" = "A name for the plugin. This is used in the plugin's metadata and is how it will be displayed in Picard's plugin manager."
"qt.CreatePluginOptionsPage.tooltip.translations_enabled" = "Determines whether the plugin will be created with multi-language support, which will add the necessary files and structure for supporting translations of the plugin's metadata and user interface. This option is recommended, as it allows for the plugin to be more easily translated in the future, and also provides a framework for handling translations of any user interface elements that the plugin may have."
