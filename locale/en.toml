"ui.tooltip.categories.coverart" = "The plugin provides cover art related processing, such as adding a new cover art source or cover art filters."
"ui.tooltip.categories.formats" = "The plugin provides additional or modified functionality regarding supported file formats, including support for a new file format."
"ui.tooltip.categories.metadata" = "The plugin modifies the metadata for an album or track, and is typically executed when the information is retrieved from MusicBrainz when an album is loaded."
"ui.tooltip.categories.other" = "The plugin provides functionality not covered by the other specific categories, or in addition to that provided by other categories."
"ui.tooltip.categories.scripting" = "The plugin provides scripting functionality, such as new script functions or new tags/variables (perhaps added via a metadata processor)."
"ui.tooltip.categories.ui" = "The plugin provides user interface modifications, such as new main or context menu actions, or other display modifications."
"ui.tooltip.code_template.action" = "Code template for the hook used to add right-click context menu actions for albums, tracks and files in 'Unmatched Files', 'Clusters' and the 'ClusterList' (parent folder of Clusters). Actions can also be added to the main Picard menu bar."
"ui.tooltip.code_template.album_post_removal" = "Code template for the hook called after an album has been removed from Picard."
"ui.tooltip.code_template.file_format" = "Code template to extend Picard with support for additional file formats. See the existing file format implementations for details on how to implement the _load and _save methods."
"ui.tooltip.code_template.file_post_add_track" = "Code template for the hook called after a file has been added to a track (on the right-hand pane of Picard)."
"ui.tooltip.code_template.file_post_load" = "Code template for the hook called after a file has been loaded into Picard. This could for example be used to load additional data for a file."
"ui.tooltip.code_template.file_post_remove_track" = "Code template for the hook called after a file has been removed from a track (on the right-hand pane of Picard)."
"ui.tooltip.code_template.file_post_save" = "Code template for the hook called after a file has been saved. This can for example be used to run additional post-processing on the file or write extra data. Note that the file's metadata is already the newly saved metadata."
"ui.tooltip.code_template.file_pre_save" = "Code template for the hook called before a file has been saved. This can for example be used to run additional pre-processing on the file."
"ui.tooltip.code_template.metadata" = "Code template for the MusicBrainz metadata post-processor hook, including both Album and Track processing examples."
"ui.tooltip.code_template.options" = "Code template for adding plugin-specific user settings and an options page for managing the settings."
"ui.tooltip.code_template.script_functions" = "Code template for adding new scripting functions to Picard, including examples with varying numbers of arguments. This provides the descriptions used in the scripting auto-completion and documentation."
"ui.tooltip.code_template.script_variables" = "Code template for adding new scripting variables to Picard, used to describe the variables in the scripting auto-completion and documentation. This is often used in conjunction with metadata processors that create new variables."

